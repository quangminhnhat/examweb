<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý người dùng</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <th:block th:replace="~{layout :: custom-css}"></th:block>
    <style>
        .search-box { max-width: 400px; border-radius: 12px; padding: 0.6rem 1.2rem; border: 2px solid #e9ecef; transition: 0.3s; }
        .search-box:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13,110,253,0.1); }
        .user-avatar { width: 40px; height: 40px; object-fit: cover; border-radius: 50%; }
        .role-badge { font-size: 0.75rem; padding: 0.3rem 0.8rem; border-radius: 50px; }
        .sort-select { border-radius: 10px; border: 2px solid #e9ecef; padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body class="d-flex flex-column h-100">
<div th:replace="~{layout :: header}"></div>

<main class="flex-shrink-0 py-5">
    <div class="container">
        <!-- Header & Controls -->
        <div class="row align-items-center mb-4 g-3">
            <div class="col-md-4">
                <h2 class="fw-bold text-dark mb-0"><i class="bi bi-people-fill me-2"></i>Quản lý người dùng</h2>
            </div>
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-start-pill ps-3">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="userSearchInput" class="form-control border-start-0 rounded-end-pill search-box"
                           placeholder="Tìm theo tên, email hoặc username..." onkeyup="filterUsers()">
                </div>
            </div>
            <div class="col-md-3 text-md-end">
                <select id="sortUserSelect" class="form-select sort-select shadow-sm" onchange="sortUsers()">
                    <option value="name_asc">Tên (A-Z)</option>
                    <option value="name_desc">Tên (Z-A)</option>
                    <option value="email_asc">Email (A-Z)</option>
                </select>
            </div>
        </div>

        <!-- Users Table Card -->
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Người dùng</th>
                            <th>Email</th>
                            <th>Số điện thoại</th>
                            <th>Vai trò</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr th:each="user : ${users}" class="user-row"
                            th:data-search="${user.username.toLowerCase() + ' ' + (user.fullName != null ? user.fullName.toLowerCase() : '') + ' ' + user.email.toLowerCase()}"
                            th:data-name="${user.fullName != null ? user.fullName.toLowerCase() : user.username.toLowerCase()}"
                            th:data-email="${user.email.toLowerCase()}">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <img th:src="${user.avatar != null ? user.avatar : 'https://ui-avatars.com/api/?name=' + user.username + '&background=random'}"
                                         class="user-avatar me-3 border" alt="avatar">
                                    <div>
                                        <div class="fw-bold text-dark user-name-display" th:text="${user.fullName != null ? user.fullName : user.username}">Full Name</div>
                                        <small class="text-muted" th:text="${'@' + user.username}">@username</small>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${user.email}">user@example.com</td>
                            <td th:text="${user.phone != null ? user.phone : 'N/A'}">0123456789</td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                      class="badge role-badge me-1"
                                      th:classappend="${role.name == 'admin' ? 'bg-danger' : (role.name == 'teacher' ? 'bg-primary' : 'bg-success')}"
                                      th:text="${role.name}">role</span>
                            </td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                        th:if="${!#authentication.name.equals(user.username)}"
                                        th:onclick="'deleteUser(' + ${user.id} + ')'">
                                    <i class="bi bi-person-x me-1"></i> Xóa
                                </button>
                                <span th:if="${#authentication.name.equals(user.username)}" class="badge bg-light text-muted">Bạn</span>
                            </td>
                        </tr>
                        <tr id="noResultsRow" style="display: none;">
                            <td colspan="5" class="text-center py-5 text-muted">Không tìm thấy người dùng phù hợp.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>

<script>
function filterUsers() {
    const query = document.getElementById('userSearchInput').value.toLowerCase();
    const rows = document.querySelectorAll('.user-row');
    let hasResults = false;

    rows.forEach(row => {
        const searchText = row.getAttribute('data-search');
        if (searchText.includes(query)) {
            row.style.display = '';
            hasResults = true;
        } else {
            row.style.display = 'none';
        }
    });

    document.getElementById('noResultsRow').style.display = hasResults ? 'none' : 'table-row';
}

function sortUsers() {
    const val = document.getElementById('sortUserSelect').value;
    const body = document.getElementById('userTableBody');
    const rows = Array.from(body.querySelectorAll('.user-row'));

    rows.sort((a, b) => {
        if (val === 'name_asc') return a.dataset.name.localeCompare(b.dataset.name);
        if (val === 'name_desc') return b.dataset.name.localeCompare(a.dataset.name);
        if (val === 'email_asc') return a.dataset.email.localeCompare(b.dataset.email);
        return 0;
    });

    rows.forEach(row => body.appendChild(row));
}

function deleteUser(userId) {
    if(confirm("Bạn có chắc chắn muốn xóa người dùng này? Mọi dữ liệu liên quan sẽ bị xóa vĩnh viễn!")) {
        fetch(`/api/management/users/${userId}`, { method: 'DELETE' })
        .then(res => {
            if(res.ok) {
                alert("Đã xóa người dùng thành công!");
                location.reload();
            } else {
                alert("Lỗi khi xóa người dùng!");
            }
        });
    }
}

// Initial sort by Name
document.addEventListener('DOMContentLoaded', sortUsers);
</script>
</body>
</html>
