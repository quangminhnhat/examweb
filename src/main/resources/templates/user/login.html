<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - EXAM ONLINE</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <th:block th:replace="~{layout :: custom-css}"></th:block>
</head>
<body style="background: #f6f7fc;">
<th:block th:replace="~{layout :: header}"></th:block>
<div class="container py-5 h-100">
    <div class="row justify-content-center align-items-center h-100">
        <div class="col-12 col-lg-6 col-md-8 col-xl-5">
            <div class="card shadow border-0" style="border-radius: 1.5rem;">
                <div class="card-body p-5 text-center">
                    <h2 class="fw-bold mb-3">Chào mừng trở lại</h2>
                    <p class="mb-4 text-secondary">Đăng nhập để tiếp tục học tập và thi cử</p>

                    <a href="/oauth2/authorization/google" class="btn btn-outline-danger w-100 py-2 mb-4 rounded-pill shadow-sm">
                        <i class="bi bi-google me-2"></i> Đăng nhập với Google
                    </a>

                    <div class="d-flex align-items-center mb-4">
                        <hr class="flex-grow-1">
                        <span class="mx-3 text-muted small text-uppercase">Hoặc</span>
                        <hr class="flex-grow-1">
                    </div>

                    <form th:action="@{/login}" method="post" class="text-start">
                        <div th:if="${param.error}" class="alert alert-danger border-0 rounded-3 mb-4">
                            Tên đăng nhập hoặc mật khẩu không đúng.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success border-0 rounded-3 mb-4">
                            Bạn đã đăng xuất thành công.
                        </div>
                        <div th:if="${message}" class="alert alert-success border-0 rounded-3 mb-4" th:text="${message}"></div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control bg-light border-0" required id="username" name="username" placeholder="Username">
                            <label for="username">Tên đăng nhập</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control bg-light border-0" required id="password" name="password" placeholder="Password">
                            <label for="password">Mật khẩu</label>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 ps-1">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" name="remember-me" id="remember-me">
                                <label class="form-check-label text-muted small" for="remember-me">Ghi nhớ đăng nhập</label>
                            </div>
                            <a th:href="@{/forgot-password}" class="text-primary small fw-bold text-decoration-none">Quên mật khẩu?</a>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill py-3 shadow-sm">ĐĂNG NHẬP</button>
                            <p class="mt-4 mb-0 text-center text-muted small">
                                Bạn chưa có tài khoản? <a class="text-primary fw-bold text-decoration-none" th:href="@{/register}">Đăng ký ngay</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{layout :: footer}"></th:block>
</body>
</html>
