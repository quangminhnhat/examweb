<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - HUTECH Exam</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
    <style>
        .profile-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .profile-header {
            background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%);
            padding: 40px 20px;
            color: white;
            text-align: center;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.2);
            margin-bottom: 15px;
            object-fit: cover;
        }
        .profile-body {
            padding: 40px;
            background: white;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            transition: 0.3s;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }
        .btn-update {
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: 0.3s;
        }
        .badge-role {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="bg-light">

<th:block th:replace="~{layout::header}"></th:block>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-3 mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> Hồ sơ đã được cập nhật thành công!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="profile-card">
                <div class="profile-header">
                    <img th:src="${user.avatar != null && !user.avatar.isEmpty() ? user.avatar : 'https://ui-avatars.com/api/?name=' + user.username + '&background=fff&color=0D6EFD&size=128'}"
                         class="profile-avatar shadow" alt="Avatar">
                    <h3 class="fw-bold mb-1" th:text="${user.fullName != null && !user.fullName.isEmpty() ? user.fullName : user.username}">Full Name</h3>
                    <p class="opacity-75 mb-2" th:text="${user.email}">user@example.com</p>
                    <div class="d-flex justify-content-center gap-2">
                        <span th:each="role : ${user.roles}"
                              th:text="${role.name}"
                              th:classappend="${role.name == 'admin' ? 'bg-danger' : (role.name == 'teacher' ? 'bg-warning text-dark' : 'bg-success')}"
                              class="badge badge-role">Role</span>
                    </div>
                </div>

                <div class="profile-body">
                    <form th:action="@{/profile/update}" th:object="${user}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" class="form-control bg-light" th:field="*{username}" readonly>
                                <small class="text-muted">Tên đăng nhập không thể thay đổi.</small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" class="form-control" th:field="*{fullName}" placeholder="Nhập họ và tên">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" placeholder="example@hutech.edu.vn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" class="form-control" th:field="*{phone}" placeholder="0123456789">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Ngày sinh</label>
                                <input type="date" class="form-control" th:field="*{dob}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">URL Ảnh đại diện</label>
                                <input type="text" class="form-control" th:field="*{avatar}" placeholder="https://link-anh.com/avatar.jpg">
                            </div>
                        </div>

                        <hr class="my-4 opacity-50">

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="/" class="btn btn-link text-decoration-none text-secondary p-0">
                                <i class="bi bi-arrow-left me-1"></i> Quay lại trang chủ
                            </a>
                            <button type="submit" class="btn btn-primary btn-update shadow-sm">
                                <i class="bi bi-save me-2"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{layout::footer}"></th:block>

</body>
</html>
