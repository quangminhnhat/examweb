<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - EXAM ONLINE</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <th:block th:replace="~{layout :: custom-css}"></th:block>
</head>
<body style="background: #f6f7fc;">
<th:block th:replace="~{layout :: header}"></th:block>
<div class="container py-5 h-100">
    <div class="row justify-content-center align-items-center h-100">
        <div class="col-12 col-lg-6 col-md-8 col-xl-5">
            <div class="card shadow border-0" style="border-radius: 1.5rem;">
                <div class="card-body p-5 text-center">
                    <h3 class="fw-bold mb-3">Quên mật khẩu?</h3>
                    <p class="mb-4 text-secondary">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>

                    <div th:if="${message}" class="alert alert-success border-0 rounded-3 mb-4" th:text="${message}"></div>
                    <div th:if="${error}" class="alert alert-danger border-0 rounded-3 mb-4" th:text="${error}"></div>

                    <form th:action="@{/forgot-password}" method="post" class="text-start">
                        <div class="form-floating mb-4">
                            <input type="email" name="email" class="form-control bg-light border-0" id="email" required placeholder="name@example.com">
                            <label for="email">Địa chỉ Email</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill py-3 shadow-sm">
                                GỬI YÊU CẦU
                            </button>
                            <a th:href="@{/login}" class="btn btn-link text-decoration-none text-muted mt-2">
                                <i class="bi bi-arrow-left me-1"></i> Quay lại đăng nhập
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{layout :: footer}"></th:block>
</body>
</html>
