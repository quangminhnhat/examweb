<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - EXAM ONLINE</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <th:block th:replace="~{layout :: custom-css}"></th:block>
</head>
<body style="background: #f6f7fc;">
<th:block th:replace="~{layout :: header}"></th:block>
<div class="container py-5 h-100">
    <div class="row justify-content-center align-items-center h-100">
        <div class="col-12 col-lg-6 col-md-8 col-xl-5">
            <div class="card shadow border-0" style="border-radius: 1.5rem;">
                <div class="card-body p-5 text-center">
                    <h3 class="fw-bold mb-3">Đặt lại mật khẩu</h3>
                    <p class="mb-4 text-secondary">Nhập mật khẩu mới cho tài khoản của bạn.</p>

                    <form th:action="@{/reset-password}" method="post" class="text-start">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="form-floating mb-4">
                            <input type="password" name="password" class="form-control bg-light border-0" id="password" required minlength="6" placeholder="Password">
                            <label for="password">Mật khẩu mới</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control bg-light border-0" id="confirmPassword" required placeholder="Confirm Password">
                            <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill py-3 shadow-sm" id="resetBtn">
                                CẬP NHẬT MẬT KHẨU
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{layout :: footer}"></th:block>
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const pass = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        if(pass !== confirm) {
            e.preventDefault();
            alert("Mật khẩu xác nhận không khớp!");
        }
    });
</script>
</body>
</html>
