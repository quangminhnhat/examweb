<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - EXAM ONLINE</title>
  <th:block th:replace="~{layout :: link-css}"></th:block>
  <th:block th:replace="~{layout :: custom-css}"></th:block>
</head>
<body style="background: #f6f7fc;">
<th:block th:replace="~{layout :: header}"></th:block>
<div class="container py-5 h-100">
  <div class="row justify-content-center align-items-center h-100">
    <div class="col-12 col-lg-6 col-md-8 col-xl-5">
      <div class="card shadow border-0" style="border-radius: 1.5rem;">
        <div class="card-body p-5 text-center">
          <h2 class="fw-bold mb-3">Tạo tài khoản mới</h2>
          <p class="mb-4 text-secondary small text-uppercase letter-spacing-1">Tham gia hệ thống thi trực tuyến HUTECH</p>

          <form th:action="@{/register}" method="post" th:object="${user}" class="text-start">

            <!-- Error Alert -->
            <div th:if="${errors}" class="alert alert-danger border-0 shadow-sm mb-4" role="alert" style="border-radius: 12px;">
              <div class="d-flex align-items-center">
                <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
                <ul class="mb-0 ps-0" style="list-style: none;">
                  <li th:each="error : ${errors}" th:text="${error}" class="fw-bold small"></li>
                </ul>
              </div>
            </div>

            <div class="form-floating mb-3">
              <input type="email" class="form-control bg-light border-0"
                     required id="email" th:field="*{email}" placeholder="name@example.com">
              <label for="email">Địa chỉ Email</label>
            </div>

            <div class="form-floating mb-3">
              <input type="text" class="form-control bg-light border-0"
                     required id="username" th:field="*{username}" placeholder="Username">
              <label for="username">Tên đăng nhập</label>
            </div>

            <div class="form-floating mb-3">
              <input type="password" class="form-control bg-light border-0"
                     required id="password" th:field="*{password}" placeholder="Password">
              <label for="password">Mật khẩu</label>
            </div>

            <div class="form-floating mb-4">
              <input type="tel" class="form-control bg-light border-0"
                     required id="phone" th:field="*{phone}" placeholder="Phone number">
              <label for="phone">Số điện thoại</label>
            </div>

            <div class="mb-4">
              <label class="form-label text-muted small fw-bold text-uppercase ms-1 mb-2">Vai trò người dùng</label>
              <div class="d-flex justify-content-between p-2 bg-light rounded-3">
                <div class="form-check form-check-inline m-0 flex-fill text-center p-2 rounded-3 border-0">
                  <input class="form-check-input d-none" type="radio" name="role" id="roleStudent" value="student" checked>
                  <label class="form-check-label w-100 py-1" for="roleStudent" style="cursor: pointer;">Sinh viên</label>
                </div>
                <div class="form-check form-check-inline m-0 flex-fill text-center p-2 rounded-3 border-0">
                  <input class="form-check-input d-none" type="radio" name="role" id="roleTeacher" value="teacher">
                  <label class="form-check-label w-100 py-1" for="roleTeacher" style="cursor: pointer;">Giảng viên</label>
                </div>
              </div>
            </div>

            <style>
              .form-check-input:checked + .form-check-label {
                background: white;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
                border-radius: 8px;
                color: #0d6efd;
                font-weight: bold;
              }
              .form-floating > .form-control:focus {
                background: #fff !important;
                box-shadow: 0 0 0 0.25rem rgba(13,110,253,0.1);
              }
            </style>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill py-3 shadow-sm border-0">
                ĐĂNG KÝ NGAY
              </button>
              <p class="mt-4 mb-0 text-center text-muted small">
                Bạn đã có tài khoản? <a class="text-primary fw-bold text-decoration-none" th:href="@{/login}">Đăng nhập tại đây</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<th:block th:replace="~{layout :: footer}"></th:block>
</body>
</html>
