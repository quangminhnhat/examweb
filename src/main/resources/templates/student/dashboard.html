<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Góc Sinh Viên - HUTECH</title>
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .class-card { transition: 0.3s; border: none; border-radius: 15px; overflow: hidden; }
        .class-card:hover { transform: translateY(-5px); shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .exam-item { transition: 0.2s; border-radius: 10px; margin-bottom: 8px; border: 1px solid #eee !important; }
        .exam-item:hover { background-color: #f8f9fa; border-color: #198754 !important; }
        .btn-leave { opacity: 0; transition: 0.3s; position: absolute; top: 10px; right: 10px; }
        .class-card:hover .btn-leave { opacity: 1; }
        .gradient-card { background: linear-gradient(45deg, #0d6efd, #0dcaf0); color: white; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{layout :: header}"></div>

<div class="container py-5">
    <div class="row align-items-center mb-5">
        <div class="col-lg-7">
            <h1 class="fw-extrabold text-dark display-6">Chào bạn, <span class="text-primary">Sinh viên!</span></h1>
            <p class="lead text-secondary">Hôm nay bạn muốn chinh phục thử thách nào?</p>
        </div>
        <div class="col-lg-5">
            <div class="input-group shadow-lg rounded-pill overflow-hidden border-0">
                <span class="input-group-text bg-white border-0 ps-4"><i class="bi bi-key-fill text-success"></i></span>
                <input type="text" id="quickExamCode" class="form-control border-0 py-3" placeholder="Nhập Mã đề thi để vào phòng ngay...">
                <button class="btn btn-success px-4 fw-bold" onclick="startExam()">VÀO THI</button>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-xl-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0"><i class="bi bi-door-open-fill me-2 text-primary"></i>Lớp học của tôi</h4>
                <button class="btn btn-primary rounded-pill btn-sm px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#joinClassModal">
                    <i class="bi bi-plus-circle me-1"></i> Tham gia lớp mới
                </button>
            </div>

            <div id="studentClassesList" class="row g-3">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <div class="col-xl-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 text-danger"><i class="bi bi-clock-history me-2"></i>Kỳ thi đang mở</h5>
                    <div id="studentExamsList">
                        <p class="text-center text-muted">Đang tìm kiếm kỳ thi...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="joinClassModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-5 text-center">
                <div class="mb-4 text-primary"><i class="bi bi-send-check display-1"></i></div>
                <h3 class="fw-bold">Ghi danh lớp học</h3>
                <p class="text-secondary mb-4">Nhập mã mời do Giáo viên cung cấp để tham gia vào lớp học ngay lập tức.</p>
                <input type="text" id="inviteCodeInput" class="form-control form-control-lg text-center fw-bold border-2 mb-4" placeholder="Ví dụ: 8 ký tự">
                <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold" onclick="joinClass()">XÁC NHẬN THAM GIA</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/js/student-dashboard.js}"></script>
</body>
</html>
